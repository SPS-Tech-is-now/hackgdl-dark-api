# Zero Trust containers para demo HackGDL
# Requiere: crapi-host.json y demo-client.json (generados por enroll.sh)

services:

  # ── Lado servidor: hace crAPI accesible como Dark Service ───
  # Se conecta SALIENTE a NetFoundry y hostea crapi-web:80
  # No abre ningún puerto de entrada
  ziti-host:
    image: openziti/ziti-edge-tunnel:latest
    container_name: ziti-host
    entrypoint: ziti-edge-tunnel
    command: run-host --identity /config/crapi-host.json
    volumes:
      - .:/config
    networks:
      - crapi_default
    restart: unless-stopped

  ziti-client:
    image: openziti/ziti-edge-tunnel:latest
    container_name: ziti-client
    entrypoint: ziti-edge-tunnel
    # proxy mode: no requiere /dev/net/tun — funciona en Windows Docker Desktop
    # crea un listener TCP en puerto 8080 que enruta al dark service via ZT
    command: proxy --identity /config/demo-client.json crapi-dark:8080
    volumes:
      - .:/config
    networks:
      - crapi_default
    ports:
      - "9090:8080"
    restart: unless-stopped

networks:
  crapi_default:
    external: true
